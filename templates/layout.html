<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Motoworks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --dark-bg: #0f0f13;
            --sidebar-bg: #16161a;
            --accent-gradient: linear-gradient(135deg, #ff4b2b, #ff416c); 
            --accent-glow: 0 4px 15px rgba(255, 75, 43, 0.4);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background-color: var(--sidebar-bg);
            position: fixed;
            padding: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }

        .main-content {
            margin-left: 260px;
            padding: 30px;
        }

        .logo-area {
            text-align: center;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
        }

        /* Gradient Text effect para sa Logo */
        .brand-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .nav-link {
            color: var(--text-muted);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            text-decoration: none;
            font-weight: 600;
        }

        .nav-link i { margin-right: 12px; font-size: 1.2rem; }

        .nav-link:hover, .nav-link.active {
            background: var(--accent-gradient);
            color: #ffffff;
            box-shadow: var(--accent-glow); 
            transform: translateX(8px); 
        }

        .card-custom {
            background: linear-gradient(145deg, #1e1e24, #16161a);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-custom:hover {
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }


        .table { color: var(--text-main); vertical-align: middle; }
        .table-dark { background-color: transparent; }
        .table-dark th { 
            background-color: #1e1e24; 
            color: var(--text-muted); 
            border-bottom: 2px solid #ff4b2b; 
        }
        .table-dark td { border-color: rgba(255,255,255,0.05); }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <h4 class="brand-text m-0">JS MOTOWORKS</h4>
            <small class="text-white fw-bold text-uppercase style="letter-spacing: 2px; font-size: 0.7rem;">SYSTEM ADMIN</small>
        </div>
        
<nav>
            {% if session.get('role') == 'Admin' %}
            <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
                <i class="fa-solid fa-gauge-high"></i> Dashboard
            </a>
            {% endif %}

            <a href="/pos" class="nav-link {% if request.path == '/pos' %}active{% endif %}">
                <i class="fa-solid fa-desktop"></i> Point of Sale
            </a>

            {% if session.get('role') == 'Admin' %}
            <a href="/inventory" class="nav-link {% if request.path == '/inventory' %}active{% endif %}">
                <i class="fa-solid fa-boxes-stacked"></i> Inventory
            </a>
            <a href="/appointments" class="nav-link {% if request.path == '/appointments' %}active{% endif %}">
                <i class="fa-solid fa-calendar-check"></i> Appointments
            </a>
            <a href="/users" class="nav-link {% if request.path == '/users' %}active{% endif %}">
                <i class="fa-solid fa-users-gear"></i> Manage Users
            </a>
            {% endif %}

            <a href="/sales" class="nav-link {% if request.path == '/sales' %}active{% endif %}">
                <i class="fa-solid fa-money-bill-trend-up"></i> Sales History
            </a>
            
            <hr style="border-color: rgba(255,255,255,0.1);">
            <a href="/logout" class="nav-link" style="color: #ff416c;">
                <i class="fa-solid fa-power-off"></i> Logout
            </a>
        </nav>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
