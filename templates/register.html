<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up - JS Motoworks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #0f0f13; color: white; }</style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card bg-dark text-white p-4" style="width: 400px; border: 1px solid #ff4b2b;">
        <h3 class="text-center mb-4" style="color: #ff4b2b;">Customer Sign Up</h3>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="POST" action="/register">
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn w-100" style="background-color: #ff4b2b; color: white;">Register</button>
            <div class="text-center mt-3"><a href="/login" class="text-muted">Already have an account? Login</a></div>
        </form>
    </div>
</body>
</html>
