<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | JS Motoworks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #0f0f13; color: white; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .success-card { background: #16161a; border-top: 5px solid #198754; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card success-card shadow-lg p-5">
                <i class="fa-solid fa-circle-check text-success" style="font-size: 5rem; margin-bottom: 20px;"></i>
                <h2 class="fw-bold text-white mb-3">Booking Received!</h2>
                <p class="text-white fw-bold mb-4 fs-5">Thank you, <span class="text-white fw-bold">{{ name }}</span>.</p>
                <p class="text-white fw-bold mb-4">Your appointment is scheduled for <br><span class="text-warning fw-bold fs-5">{{ date }} at {{ time }}</span>.</p>
                <p class="small text-secondary mt-3">Please wait for our SMS confirmation or call us if you have urgent concerns.</p>
                
                <a href="/book" class="btn btn-outline-light rounded-pill mt-4 px-4 py-2">Book Another</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
