<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - JS Motoworks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0f0f13; 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: linear-gradient(145deg, #1e1e24, #16161a);
            border: 1px solid rgba(255, 75, 43, 0.3);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand-text {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: 1px;
        }
        .form-control {
            background-color: #2a2a32;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .form-control:focus {
            background-color: #2a2a32;
            color: white;
            border-color: #ff4b2b;
            box-shadow: 0 0 5px rgba(255, 75, 43, 0.5);
        }
        .btn-custom {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            border: none;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h2 class="brand-text mb-1">JS MOTOWORKS</h2>
        <p class="text-muted mb-4">System Authentication</p>

        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        
        {% if msg %}
        <div class="alert alert-success py-2">{{ msg }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3 text-start">
                <label class="form-label text-muted small">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-muted small">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn btn-custom btn-lg w-100 mb-3">LOGIN</button>
            <a href="/register" class="text-muted" style="font-size: 0.85rem; text-decoration: none;">Are you a customer? Track your booking here.</a>
        </form>
    </div>

</body>
</html>
