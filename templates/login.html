<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login | JS Motoworks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f0f13;
            color: white;
            background-image: radial-gradient(circle at bottom left, #2a1111, #0f0f13 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand-text {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 2.5rem;
        }
        .login-card {
            background: #16161a;
            border-top: 4px solid #ff4b2b;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
        }
        .form-control {
            background-color: #212529;
            color: white;
            border: 1px solid #333;
            padding: 12px;
        }
        .form-control:focus {
            background-color: #2b3035;
            color: white;
            border-color: #ff4b2b;
            box-shadow: 0 0 0 0.25rem rgba(255, 75, 43, 0.25);
        }
        .input-group-text {
            background-color: #212529;
            border: 1px solid #333;
            color: #888;
        }
        
        #eyeToggle {
            cursor: pointer;
        }
        #eyeToggle:hover {
            color: white;
        }
        ::placeholder {
            color: #777 !important;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: white;
            border: none;
            padding: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 75, 43, 0.4);
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-card mx-3">
        <div class="text-center mb-4">
            <h1 class="brand-text m-0">JS MOTOWORKS</h1>
            <p class="fw-bold text-white m-0 style="letter-spacing: 3px; font-size: 0.8rem;">SYSTEM PORTAL</p>
        </div>

        {% if error %}
        <div class="alert alert-danger text-center bg-dark text-danger fw-bold py-2 shadow-sm border-danger" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label text-white small fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-white small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" id="passInput" class="form-control" placeholder="Enter your password" required>
                    <span class="input-group-text" id="eyeToggle" onclick="togglePassword()">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-gradient w-100 rounded-pill mt-2 shadow-lg">LOGIN TO SYSTEM</button>
        </form>

        <div class="text-center mt-4 pt-3 border-top border-secondary">
            <small class="text-white">Need to book an appointment? <br> 
                <a href="/book" class="text-warning text-decoration-none fw-bold"><i class="fa-solid fa-calendar-check me-1"></i>Go to Booking Page</a>
            </small>
        </div>
    </div>

    <script>
        function togglePassword() {
            let passInput = document.getElementById("passInput");
            let eyeIcon = document.getElementById("eyeIcon");
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passInput.type = "password";
                eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
